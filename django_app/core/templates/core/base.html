<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}MFA System{% endblock title %}</title>
    <style>
        :root {
            --bg: #edf3f8;
            --surface: #ffffff;
            --surface-soft: #f7fafc;
            --border: #d3dee8;
            --ink: #17324d;
            --muted: #52606d;
            --accent: #174a74;
            --accent-strong: #10324f;
            --accent-soft: #dceaf6;
            --success-soft: #d9f2e3;
            --warning-soft: #fff1c2;
            --danger-soft: #f9d6d5;
            --shadow: 0 14px 32px rgba(17, 44, 75, 0.08);
        }
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            margin: 0;
            background:
                radial-gradient(circle at top, #f8fbfd 0%, var(--bg) 42%, #e8eff6 100%);
            color: var(--ink);
        }
        header {
            background: linear-gradient(135deg, var(--accent-strong), var(--accent));
            color: #ffffff;
            padding: 1.25rem 1.5rem 1rem;
            box-shadow: 0 10px 25px rgba(9, 31, 49, 0.2);
        }
        .header-shell {
            max-width: 1100px;
            margin: 0 auto;
        }
        .brand-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 1rem;
            flex-wrap: wrap;
        }
        header h1 {
            margin: 0;
            font-size: 1.75rem;
            letter-spacing: 0.02em;
        }
        .tagline {
            color: rgba(255, 255, 255, 0.82);
            max-width: 36rem;
        }
        nav {
            margin-top: 1rem;
            display: flex;
            gap: 0.55rem;
            flex-wrap: wrap;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
        }
        main {
            padding: 1.85rem 1.5rem 3rem;
            max-width: 1100px;
            margin: 0 auto;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.15rem 1.2rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }
        .panel h2,
        .panel h3 {
            margin-top: 0;
            margin-bottom: 0.5rem;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 0.35rem;
            color: var(--accent);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 0.65rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        .muted {
            color: var(--muted);
        }
        .status {
            display: inline-block;
            padding: 0.22rem 0.65rem;
            border-radius: 999px;
            background: var(--accent-soft);
            font-weight: 600;
        }
        .status.approved {
            background: var(--success-soft);
        }
        .status.denied {
            background: var(--danger-soft);
        }
        .status.in-progress {
            background: var(--warning-soft);
        }
        .messages {
            list-style: none;
            padding: 0;
            margin: 0 0 1rem 0;
        }
        .messages li {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 0.75rem;
            box-shadow: var(--shadow);
        }
        .messages .success {
            background: var(--success-soft);
        }
        .messages .warning {
            background: var(--warning-soft);
        }
        .messages .error {
            background: var(--danger-soft);
        }
        .messages .info {
            background: var(--accent-soft);
        }
        .form-grid {
            display: grid;
            gap: 1rem;
        }
        .form-field label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.35rem;
        }
        .form-field input,
        .form-field select,
        .form-field textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 0.65rem;
            border: 1px solid #bcccdc;
            border-radius: 8px;
            background: var(--surface-soft);
        }
        .helptext {
            display: block;
            margin-top: 0.35rem;
            color: var(--muted);
            font-size: 0.92rem;
        }
        .errorlist {
            color: #b42318;
            margin: 0.35rem 0 0 0;
            padding-left: 1rem;
        }
        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .button,
        button {
            background: var(--accent);
            color: #ffffff;
            border: 0;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
        }
        .button.secondary,
        button.secondary {
            background: #5e7489;
        }
        .button.warning,
        button.warning {
            background: #b42318;
        }
        .callout {
            border-radius: 12px;
            padding: 1rem 1.1rem;
            margin-top: 0.9rem;
        }
        .callout h3 {
            margin: 0 0 0.3rem 0;
        }
        .callout.info {
            background: var(--accent-soft);
        }
        .callout.success {
            background: var(--success-soft);
        }
        .callout.warning {
            background: var(--warning-soft);
        }
        .result-banner {
            padding: 1rem;
            border-radius: 12px;
            font-weight: bold;
        }
        .result-banner.granted {
            background: var(--success-soft);
        }
        .result-banner.denied {
            background: var(--danger-soft);
        }
        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.09em;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        .stack-list {
            margin: 0;
            padding-left: 1.2rem;
        }
        .stack-list li + li {
            margin-top: 0.35rem;
        }
        code {
            background: #edf3f8;
            padding: 0.12rem 0.3rem;
            border-radius: 4px;
        }
        ul {
            padding-left: 1.2rem;
        }
        @media (max-width: 720px) {
            main {
                padding: 1.25rem 1rem 2rem;
            }
            .panel {
                padding: 1rem;
            }
            table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-shell">
            <div class="brand-row">
                <div>
                    <h1>MFA Access Control Demo</h1>
                    <div class="tagline">Django is the system of record for policies, credentials, sessions, and audit history.</div>
                </div>
            </div>
            <nav>
                <a href="{% url 'core:home' %}">Home</a>
                <a href="{% url 'core:simulation-start' %}">Simulation</a>
                <a href="{% url 'core:resource-list' %}">Backend Pages</a>
                <a href="{% url 'core:audit-log' %}">Audit</a>
                <a href="{% url 'admin:index' %}">Admin</a>
            </nav>
        </div>
    </header>
    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags|default:'info' }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock content %}
    </main>
</body>
</html>
