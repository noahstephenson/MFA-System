<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}MFA System{% endblock title %}</title>
    <style>
        :root {
            --bg: #eef3f7;
            --surface: #ffffff;
            --surface-soft: #f7fafc;
            --border: #d5dee7;
            --ink: #17324d;
            --muted: #5b6875;
            --accent: #16456c;
            --accent-strong: #0f2f4a;
            --accent-soft: #dce9f5;
            --success-soft: #def3e6;
            --warning-soft: #fff3cc;
            --danger-soft: #f9dfdd;
            --shadow: 0 16px 36px rgba(16, 35, 57, 0.08);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background:
                radial-gradient(circle at top, #f9fbfd 0%, var(--bg) 46%, #e7eef5 100%);
            color: var(--ink);
        }
        header {
            background: linear-gradient(135deg, var(--accent-strong), var(--accent));
            color: #ffffff;
            box-shadow: 0 12px 28px rgba(8, 27, 43, 0.22);
        }
        .header-shell,
        main {
            max-width: 1120px;
            margin: 0 auto;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }
        .header-shell {
            padding-top: 1.1rem;
            padding-bottom: 0.95rem;
        }
        .brand-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .brand-row h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 0.02em;
        }
        .tagline {
            margin-top: 0.35rem;
            color: rgba(255, 255, 255, 0.82);
            max-width: 32rem;
        }
        nav {
            margin-top: 0.95rem;
            display: flex;
            gap: 0.55rem;
            flex-wrap: wrap;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            padding: 0.45rem 0.85rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
        }
        main {
            padding-top: 1.8rem;
            padding-bottom: 3rem;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.15rem 1.2rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }
        .panel.compact {
            padding: 1rem 1.05rem;
        }
        .panel h2,
        .panel h3 {
            margin-top: 0;
            margin-bottom: 0.5rem;
        }
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .hero h1 {
            margin: 0;
            font-size: 2rem;
        }
        .hero-copy {
            max-width: 40rem;
        }
        .eyebrow {
            margin-bottom: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--muted);
        }
        .muted {
            color: var(--muted);
        }
        .card-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }
        .feature-card {
            display: block;
            padding: 1.1rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, var(--surface), #fbfdff);
            box-shadow: var(--shadow);
            text-decoration: none;
            color: inherit;
        }
        .feature-card h2 {
            margin: 0 0 0.4rem 0;
        }
        .feature-card p {
            margin: 0;
        }
        .split-layout {
            display: grid;
            gap: 1rem;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        }
        .stats {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        }
        .stat-value {
            margin-top: 0.35rem;
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--accent);
        }
        .messages {
            list-style: none;
            padding: 0;
            margin: 0 0 1rem 0;
        }
        .messages li {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            box-shadow: var(--shadow);
        }
        .messages .success {
            background: var(--success-soft);
        }
        .messages .warning {
            background: var(--warning-soft);
        }
        .messages .error {
            background: var(--danger-soft);
        }
        .messages .info {
            background: var(--accent-soft);
        }
        .form-grid {
            display: grid;
            gap: 1rem;
        }
        .form-field label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }
        .form-field input,
        .form-field select,
        .form-field textarea {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #bcccdc;
            border-radius: 10px;
            background: var(--surface-soft);
            color: var(--ink);
        }
        .errorlist {
            color: #b42318;
            margin: 0.35rem 0 0 0;
            padding-left: 1rem;
        }
        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .button,
        button {
            background: var(--accent);
            color: #ffffff;
            border: 0;
            border-radius: 10px;
            padding: 0.72rem 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 700;
        }
        .button.secondary,
        button.secondary {
            background: #62798e;
        }
        .detail-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .detail-list li + li {
            margin-top: 0.6rem;
        }
        .detail-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.15rem;
        }
        .callout {
            border-radius: 14px;
            padding: 1rem 1.05rem;
        }
        .callout.success {
            background: var(--success-soft);
        }
        .callout.warning {
            background: var(--warning-soft);
        }
        .callout.info {
            background: var(--accent-soft);
        }
        .factor-grid {
            display: grid;
            gap: 0.85rem;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }
        .factor-card {
            border-radius: 14px;
            padding: 0.95rem 1rem;
            border: 1px solid var(--border);
            background: var(--surface-soft);
        }
        .factor-card.success {
            background: var(--success-soft);
            border-color: #95c7a6;
        }
        .factor-card.error {
            background: var(--danger-soft);
            border-color: #d7a4a1;
        }
        .factor-card.muted {
            background: #f0f4f8;
            border-color: #d6dee7;
        }
        .factor-top {
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
            align-items: flex-start;
        }
        .factor-top h3 {
            margin: 0;
            font-size: 1rem;
        }
        .pill {
            display: inline-block;
            padding: 0.22rem 0.6rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            background: var(--accent-soft);
            color: var(--ink);
        }
        .pill.success {
            background: #b9e4c7;
        }
        .pill.error {
            background: #efc1bd;
        }
        .pill.muted {
            background: #e0e7ef;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 0.65rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        code {
            background: #edf3f8;
            padding: 0.12rem 0.3rem;
            border-radius: 4px;
        }
        @media (max-width: 840px) {
            .split-layout {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 720px) {
            .header-shell,
            main {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            main {
                padding-top: 1.2rem;
                padding-bottom: 2rem;
            }
            .panel {
                padding: 1rem;
            }
            table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-shell">
            <div class="brand-row">
                <div>
                    <h1>MFA Operator Console</h1>
                    <div class="tagline">Access and credential setup for the demo stack.</div>
                </div>
            </div>
            <nav>
                <a href="{% url 'core:home' %}">Home</a>
                <a href="{% url 'core:access-start' %}">Access</a>
                <a href="{% url 'core:enroll' %}">Enroll</a>
                <a href="{% url 'admin:index' %}">Admin</a>
            </nav>
        </div>
    </header>
    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags|default:'info' }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock content %}
    </main>
</body>
</html>
