<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}MFA Demo{% endblock title %}</title>
    <style>
        :root {
            --bg: #edf2f7;
            --surface: #ffffff;
            --surface-soft: #f6f9fc;
            --border: #d2dce6;
            --ink: #13293d;
            --muted: #5f6f80;
            --accent: #154a74;
            --accent-strong: #0d314d;
            --accent-soft: #e2edf6;
            --success: #1f7a45;
            --success-soft: #dff3e5;
            --warning-soft: #fff1c9;
            --danger: #b42318;
            --danger-soft: #f8e0dd;
            --shadow: 0 18px 38px rgba(15, 32, 50, 0.08);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: Aptos, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top, #fbfdff 0%, var(--bg) 46%, #e5edf4 100%);
            color: var(--ink);
        }
        header {
            background: linear-gradient(135deg, var(--accent-strong), var(--accent));
            color: #ffffff;
            box-shadow: 0 14px 30px rgba(8, 27, 43, 0.18);
        }
        .header-shell,
        main {
            max-width: 1080px;
            margin: 0 auto;
            padding-left: 1.25rem;
            padding-right: 1.25rem;
        }
        .header-shell {
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .brand-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .brand-row h1 {
            margin: 0;
            font-size: 1.55rem;
            letter-spacing: 0.01em;
        }
        .tagline {
            margin-top: 0.3rem;
            color: rgba(255, 255, 255, 0.8);
        }
        nav {
            margin-top: 0.95rem;
            display: flex;
            gap: 0.55rem;
            flex-wrap: wrap;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            padding: 0.48rem 0.9rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.08);
            font-weight: 600;
        }
        nav a.active {
            background: #ffffff;
            color: var(--accent-strong);
            border-color: #ffffff;
        }
        main {
            padding-top: 1.6rem;
            padding-bottom: 3rem;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.2rem 1.25rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }
        .panel.compact {
            padding: 1rem 1.05rem;
        }
        .panel h2,
        .panel h3 {
            margin-top: 0;
            margin-bottom: 0.5rem;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .page-header h1 {
            margin: 0;
            font-size: 2rem;
            line-height: 1.1;
        }
        .lead {
            max-width: 36rem;
            margin: 0.55rem 0 0 0;
            color: var(--muted);
            font-size: 1rem;
        }
        .eyebrow {
            margin-bottom: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.74rem;
            font-weight: 700;
            color: var(--muted);
        }
        .muted {
            color: var(--muted);
        }
        .action-grid,
        .summary-grid,
        .factor-grid,
        .stats-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }
        .feature-card {
            display: block;
            padding: 1.2rem;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, var(--surface), #fbfdff);
            box-shadow: var(--shadow);
            text-decoration: none;
            color: inherit;
        }
        .feature-card h2 {
            margin: 0 0 0.45rem 0;
        }
        .feature-card p {
            margin: 0;
        }
        .workflow-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        }
        .messages {
            list-style: none;
            padding: 0;
            margin: 0 0 1rem 0;
        }
        .messages li {
            padding: 0.82rem 1rem;
            border-radius: 14px;
            margin-bottom: 0.75rem;
            box-shadow: var(--shadow);
        }
        .messages .success {
            background: var(--success-soft);
        }
        .messages .warning {
            background: var(--warning-soft);
        }
        .messages .error {
            background: var(--danger-soft);
        }
        .messages .info {
            background: var(--accent-soft);
        }
        .form-grid {
            display: grid;
            gap: 1rem;
        }
        .inline-form {
            display: flex;
            gap: 0.85rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .form-field label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }
        .form-field input,
        .form-field select,
        .form-field textarea {
            width: 100%;
            padding: 0.72rem 0.78rem;
            border: 1px solid #bcccdc;
            border-radius: 12px;
            background: var(--surface-soft);
            color: var(--ink);
            font: inherit;
        }
        .form-field input:focus,
        .form-field select:focus,
        .form-field textarea:focus {
            outline: 2px solid rgba(21, 74, 116, 0.16);
            border-color: var(--accent);
        }
        .errorlist {
            color: var(--danger);
            margin: 0.35rem 0 0 0;
            padding-left: 1rem;
        }
        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .button,
        button {
            background: var(--accent);
            color: #ffffff;
            border: 0;
            border-radius: 12px;
            padding: 0.74rem 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 700;
            font: inherit;
        }
        .button.secondary,
        button.secondary {
            background: #5f7080;
        }
        .button:disabled,
        button:disabled {
            background: #a8b7c4;
            cursor: not-allowed;
        }
        .detail-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .detail-list li + li {
            margin-top: 0.6rem;
        }
        .detail-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.15rem;
        }
        .status-note,
        .callout {
            border-radius: 14px;
            padding: 1rem 1.05rem;
        }
        .status-note {
            background: var(--accent-soft);
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .callout.success {
            background: var(--success-soft);
        }
        .callout.warning {
            background: var(--warning-soft);
        }
        .callout.info {
            background: var(--accent-soft);
        }
        .factor-card {
            border-radius: 14px;
            padding: 1rem;
            border: 1px solid var(--border);
            background: var(--surface-soft);
        }
        .factor-card.neutral {
            background: var(--accent-soft);
            border-color: #b7cde0;
        }
        .factor-card.success {
            background: var(--success-soft);
            border-color: #95c7a6;
        }
        .factor-card.error {
            background: var(--danger-soft);
            border-color: #d7a4a1;
        }
        .factor-card.muted {
            background: #f0f4f8;
            border-color: #d6dee7;
        }
        .factor-top {
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
            align-items: flex-start;
        }
        .factor-top h3 {
            margin: 0;
            font-size: 1rem;
        }
        .factor-card p {
            margin: 0.75rem 0 0 0;
        }
        .pill {
            display: inline-block;
            padding: 0.22rem 0.6rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            background: var(--accent-soft);
            color: var(--ink);
        }
        .pill.success {
            background: #bae7c7;
            color: var(--success);
        }
        .pill.error {
            background: #efc1bd;
            color: var(--danger);
        }
        .pill.muted {
            background: #e0e7ef;
        }
        .readout {
            margin-top: 0.9rem;
            padding: 0.85rem 0.95rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface-soft);
        }
        .readout.success {
            background: var(--success-soft);
            border-color: #95c7a6;
        }
        .readout.error {
            background: var(--danger-soft);
            border-color: #d7a4a1;
        }
        .readout strong {
            display: block;
            margin-bottom: 0.25rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 0.65rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        code {
            background: #edf3f8;
            padding: 0.12rem 0.3rem;
            border-radius: 4px;
        }
        @media (max-width: 840px) {
            .workflow-grid {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 720px) {
            .header-shell,
            main {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            main {
                padding-top: 1.2rem;
                padding-bottom: 2rem;
            }
            .panel {
                padding: 1rem;
            }
            .inline-form {
                display: grid;
                align-items: stretch;
            }
            table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-shell">
            <div class="brand-row">
                <div>
                    <h1>MFA Demo</h1>
                </div>
            </div>
            <nav>
                <a class="{% if nav_key == 'home' %}active{% endif %}" href="{% url 'core:home' %}">Home</a>
                <a class="{% if nav_key == 'enroll' %}active{% endif %}" href="{% url 'core:enroll' %}">Enroll</a>
                <a class="{% if nav_key == 'access' %}active{% endif %}" href="{% url 'core:access-start' %}">Access</a>
            </nav>
        </div>
    </header>
    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags|default:'info' }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock content %}
    </main>
</body>
</html>
